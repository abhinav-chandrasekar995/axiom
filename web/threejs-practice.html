<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Practise</title>
</head>
<body> 
   <!-- split code into reusable files with explicit exports and imports -->
   <script type="module"> 
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
    camera.position.z=5;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight= new THREE.AmbientLight(0xffffff, 0.15);
    scene.add(ambientLight);

    const directionLight=new THREE.DirectionalLight(0xffffff, 1.1);
    directionLight.position.set(3,5,4);
    scene.add(directionLight);

    const geometry=new THREE.BoxGeometry(1,1,1);
    scene.background=new THREE.Color(0x000000);

    const material=new THREE.MeshNormalMaterial();

    const cube=new THREE.Mesh(geometry,material); //we are now using Mesh->Geometry,Material
    scene.add(cube);

     function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01; //transformation properties of cube or the Mesh which we created
      cube.rotation.z += 0.01;
      renderer.render(scene,camera);
    }
    animate();
   </script>
</body>
</html>
